services:
  mongodb:
    image: mongo:7
    container_name: mongodb-patterns
    ports:
      - "27018:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb-data:/data/db
    # IOPS simulation via blkio_config (Linux cgroups v1 only).
    # On Docker Desktop (macOS/Windows WSL2), blkio limits are silently ignored — compose still starts.
    # To find your block device path:
    #   Linux:   lsblk → typically /dev/sda
    #   WSL2:    /dev/sda (virtual disk)
    #   macOS:   not applicable (blkio not supported)
    # Override defaults: IOPS_LIMIT=3000 BLKIO_DEVICE=/dev/sda docker compose up
    blkio_config:
      device_read_iops:
        - path: ${BLKIO_DEVICE:-/dev/sda}
          rate: ${IOPS_LIMIT:-3000}
      device_write_iops:
        - path: ${BLKIO_DEVICE:-/dev/sda}
          rate: ${IOPS_LIMIT:-3000}
    healthcheck:
      test: >
        mongosh --quiet
        --eval "try { rs.status().ok } catch(e) { 0 }" | grep -q 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb-init:
    image: mongo:7
    container_name: mongodb-init
    depends_on:
      mongodb:
        condition: service_started
    restart: "no"
    entrypoint: >
      mongosh --host mongodb:27017 --quiet --eval "
        while (true) {
          try { db.adminCommand('ping'); break; } catch(e) { sleep(1000); }
        }
        try {
          var status = rs.status();
          if (status.ok) { print('Replica set already initialized'); quit(0); }
        } catch(e) {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] });
          print('Replica set rs0 initiated');
        }
      "

  benchmarks:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mongodb-benchmarks
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      CONNECTION_STRING: "mongodb://admin:N05%40ssword@mongodb:27017/?replicaSet=rs0&authSource=admin"
      LOAD_SIZE: ${LOAD_SIZE:-1000}
      CONCURRENCY: ${CONCURRENCY:-5}
      BATCH_SIZE: ${BATCH_SIZE:-1}

volumes:
  mongodb-data:
