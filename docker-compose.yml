services:
  mongodb:
    image: mongo:7
    container_name: mongodb-patterns
    ports:
      - "27018:27017"
    entrypoint: ["/scripts/mongo-entrypoint.sh"]
    volumes:
      - mongodb-data:/data/db
      - ./scripts/mongo-entrypoint.sh:/scripts/mongo-entrypoint.sh:ro
    # IOPS simulation via blkio_config (Linux cgroups v1 only).
    # On Docker Desktop (macOS/Windows WSL2), blkio limits are silently ignored — compose still starts.
    # To find your block device path:
    #   Linux:   lsblk → typically /dev/sda
    #   WSL2:    /dev/sda (virtual disk)
    #   macOS:   not applicable (blkio not supported)
    # Override defaults: IOPS_LIMIT=3000 BLKIO_DEVICE=/dev/sda docker compose up
    blkio_config:
      device_read_iops:
        - path: ${BLKIO_DEVICE:-/dev/sda}
          rate: ${IOPS_LIMIT:-3000}
      device_write_iops:
        - path: ${BLKIO_DEVICE:-/dev/sda}
          rate: ${IOPS_LIMIT:-3000}
    # Resource limits — override via MONGO_MEMORY (e.g. "4g") and MONGO_CPUS (e.g. "4.0")
    mem_limit: ${MONGO_MEMORY:-2g}
    cpus: ${MONGO_CPUS:-2.0}
    healthcheck:
      test: >
        mongosh --quiet
        --eval "try { rs.status().ok } catch(e) { 0 }" | grep -q 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  benchmarks:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mongodb-benchmarks
    depends_on:
      mongodb:
        condition: service_healthy
    # Resource limits — override via BENCH_MEMORY and BENCH_CPUS
    mem_limit: ${BENCH_MEMORY:-1g}
    cpus: ${BENCH_CPUS:-2.0}
    volumes:
      - ./results:/app/results
    environment:
      CONNECTION_STRING: "${CONNECTION_STRING:-mongodb://mongodb:27017/?replicaSet=rs0}"
      LOAD_SIZE: ${LOAD_SIZE:-10000}
      CONCURRENCY: ${CONCURRENCY:-20}
      BATCH_SIZE: ${BATCH_SIZE:-1}
      # MongoDB container specs passed through for report
      MONGO_IMAGE: "mongo:7"
      MONGO_MEMORY: ${MONGO_MEMORY:-2g}
      MONGO_CPUS: ${MONGO_CPUS:-2.0}
      MONGO_IOPS_LIMIT: ${IOPS_LIMIT:-3000}
      BENCH_MEMORY: ${BENCH_MEMORY:-1g}
      BENCH_CPUS: ${BENCH_CPUS:-2.0}

volumes:
  mongodb-data:
